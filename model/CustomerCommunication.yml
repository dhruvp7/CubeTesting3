# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: CustomerCommunication
    title: Customer Communication
    description: Customer Communication
    sql_table: eng_ao_format_testing.customer_communications
    joins:
      - name: Customer
        relationship: one_to_one
        sql: "{CUBE}.customer_id = {Customer}.id"
    dimensions:
      - name: description
        sql: "{CUBE}.description"
        type: string
        title: Description
        meta:
          llm_description: A brief description of the communication entry.
      - name: email
        sql: "{CUBE}.email"
        type: string
        title: Email
        meta:
          llm_description: Email address of the customer.
      - name: extension
        sql: "{CUBE}.extension"
        type: string
        title: Extension
        meta:
          llm_description: Phone extension number for the customer.
      - name: id
        sql: "{CUBE}.id"
        type: string
        primary_key: true
        title: ID
        meta:
          llm_description: Unique identifier for the communication entry.
      - name: idDefault
        sql: "{CUBE}.is_default"
        type: boolean
        title: Is Default
        meta:
          llm_description: Indicates if this communication method is the default for the customer.
      - name: phone
        sql: "{CUBE}.phone"
        type: string
        title: Phone
        meta:
          llm_description: Phone number of the customer.
      - name: smsEnabled
        sql: "{CUBE}.sms_enabled"
        type: boolean
        title: SMS Enabled
        meta:
          llm_description: Indicates if SMS communication is enabled for the customer.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::CustomerCommunication
      llm_description: CustomerCommunication table stores customer contact details, including email, phone, and SMS preferences, along with unique identifiers and descriptions for effective communication management.
