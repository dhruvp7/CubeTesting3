cubes:
  - name: CustomerAddress
    title: Customer Address
    description: list of addresses for a customer
    sql_table: eng_ao_format_testing.CustomerAddress
    joins:
      # TODO - VERIFY: references nested/dotted field 'addressType.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: AddressType
        relationship: many_to_one
        sql: "{CUBE}.addressType.id = {AddressType}.id"
      # TODO - VERIFY: references nested/dotted field 'customer.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: Customer
        relationship: many_to_one
        sql: "{CUBE}.customer.id = {Customer}.id"
    dimensions:
      - name: id
        sql: "{CUBE}.address_id"
        type: string
        primary_key: true
        title: ID
        meta:
          llm_description: Unique identifier for the customer address record.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::CustomerAddress
      llm_description: CustomerAddress table stores detailed address information for customers, including street, city, state, country, postal code, and address type, facilitating accurate customer location tracking and service delivery.
