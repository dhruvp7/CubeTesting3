# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: MeterReading
    title: Meter Reading
    description: This mso represents a meter
    sql_table: eng_ao_format_testing.meter_reading
    joins:
      - name: Meter
        relationship: many_to_one
        sql: "{CUBE}.meter_id = {Meter}.id"
      - name: MeterReadReason
        relationship: many_to_one
        sql: "{CUBE}.meter_read_reason = {MeterReadReason}.id"
      - name: MeterReadStatus
        relationship: many_to_one
        sql: "{CUBE}.meter_read_status = {MeterReadStatus}.id"
      - name: MeterReadType
        relationship: many_to_one
        sql: "{CUBE}.meter_read_type = {MeterReadType}.id"
    dimensions:
      - name: actualMeterReadDate
        sql: "{CUBE}.actual_meter_read_date"
        type: time
        title: Actual Read Date
        meta:
          llm_description: The date when the meter reading was actually taken.
      - name: billingUOM
        sql: "{CUBE}.unit_for_billing"
        type: string
        title: Billing UOM
        meta:
          llm_description: The unit of measurement used for billing purposes.
      - name: consumption
        sql: "{CUBE}.consumption"
        type: number
        title: Consumption
        meta:
          llm_description: The amount of water consumed as recorded by the meter.
      - name: id
        sql: "{CUBE}.id"
        type: string
        primary_key: true
        title: ID
        meta:
          llm_description: A unique identifier for the meter reading record.
      - name: meterCode
        sql: "{CUBE}.meter_code"
        type: string
        title: Meter Code
        meta:
          llm_description: A code representing the specific meter.
      - name: readNote
        sql: "{CUBE}.meter_read_note"
        type: string
        title: Meter Read Note
        meta:
          llm_description: Notes or comments related to the meter reading.
      - name: readTime
        sql: "{CUBE}.meter_reading_time"
        type: time
        title: Read Time
        meta:
          llm_description: The exact time when the meter reading was taken.
      - name: reading
        sql: "{CUBE}.meter_reading"
        type: number
        title: Read Value
        meta:
          llm_description: The numerical value recorded by the meter.
      - name: readingUOM
        sql: "{CUBE}.meter_reading_unit"
        type: string
        title: Reading UOM
        meta:
          llm_description: The unit of measurement for the meter reading.
      - name: register
        sql: "{CUBE}.register"
        type: string
        title: Register
        meta:
          llm_description: The register associated with the meter reading.
      - name: scheduledMeterReadDate
        sql: "{CUBE}.scheduled_meter_read_date"
        type: time
        title: Scheduled Read Date
        meta:
          llm_description: The date when the meter reading was scheduled to be taken.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::MeterReading
      llm_description: The MeterReading table captures detailed information about water meter readings, including dates, consumption, meter identifiers, reading status, and notes, facilitating accurate billing and operational tracking.
