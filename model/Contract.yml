# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: Contract
    title: Contract
    description: Customer Contract
    sql_table: eng_ao_format_testing.contract
    joins:
      - name: ContractAccount
        relationship: many_to_one
        sql: "{CUBE}.contract_account_id = {ContractAccount}.id"
      - name: ServiceType
        relationship: many_to_one
        sql: "{CUBE}.service_type = {ServiceType}.id"
    dimensions:
      - name: endDate
        sql: "{CUBE}.end_date"
        type: time
        title: End Date
        meta:
          llm_description: The date when the contract ends.
      - name: id
        sql: "{CUBE}.id"
        type: string
        primary_key: true
        title: ID
        meta:
          llm_description: Unique identifier for the contract.
      - name: isActive
        sql: "{CUBE}.is_active"
        type: boolean
        title: Is Active
        meta:
          llm_description: Indicates whether the contract is currently active.
      - name: startDate
        sql: "{CUBE}.start_date"
        type: time
        title: Start Date
        meta:
          llm_description: The date when the contract starts.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::Contract
      llm_description: The Contract table stores information about service contracts, including contract account ID, service type ID, start and end dates, contract ID, and active status.
