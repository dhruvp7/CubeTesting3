cubes:
  - name: CustomerInteractions
    title: Customer Interactions
    description: Customer Interactions
    sql_table: eng_ao_format_testing.customer_interactions
    joins:
      # TODO - VERIFY: references nested/dotted field 'contractAccount.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: ContractAccount
        relationship: many_to_one
        sql: "{CUBE}.contractAccount.id = {ContractAccount}.id"
      # TODO - VERIFY: references nested/dotted field 'customer.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: Customer
        relationship: many_to_one
        sql: "{CUBE}.customer.id = {Customer}.id"
      - name: Premise
        relationship: many_to_one
        sql: "{CUBE}.premise_id = {Premise}.id"
      - name: UtilitiesDocument
        relationship: one_to_one
        sql: "{CUBE}.document_id = {UtilitiesDocument}.id"
    dimensions:
      - name: action
        sql: "{CUBE}.ir_action"
        type: string
        title: Action
        meta:
          llm_description: Specifies the type of action taken during the customer interaction.
      - name: actionDescription
        sql: "{CUBE}.action_text"
        type: string
        title: Action Description
        meta:
          llm_description: Provides a detailed description of the action taken.
      - name: category
        sql: "{CUBE}.category"
        type: string
        title: Category
        meta:
          llm_description: Classifies the interaction into a specific category.
      - name: categoryDescription
        sql: "{CUBE}.category_description"
        type: string
        title: Category Description
        meta:
          llm_description: Gives a detailed description of the interaction category.
      - name: irClass
        sql: "{CUBE}.ir_class"
        type: string
        title: Class
        meta:
          llm_description: Classifies the interaction record.
      - name: classDescription
        sql: "{CUBE}.class_text"
        type: string
        title: Class Description
        meta:
          llm_description: Describes the class of the interaction.
      - name: interactionDescription
        sql: "{CUBE}.interaction_description"
        type: string
        title: Description
        meta:
          llm_description: Detailed description of the interaction.
      - name: id
        sql: "{CUBE}.id"
        type: string
        primary_key: true
        title: ID
        meta:
          llm_description: Unique identifier for the customer interaction record.
      - name: interactionDate
        sql: "{CUBE}.interaction_date"
        type: time
        title: Interaction Date
        meta:
          llm_description: The date when the interaction took place.
      - name: interactionType
        sql: "{CUBE}.interaction_type"
        type: string
        title: Interaction Type
        meta:
          llm_description: Specifies the type of interaction.
      - name: priority
        sql: "{CUBE}.priority"
        type: string
        title: Priority
        meta:
          llm_description: Indicates the priority level of the interaction.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::CustomerInteractions
      llm_description: CustomerInteractions table captures detailed records of customer interactions, including action types, descriptions, categories, associated contract accounts, customer IDs, documents, interaction dates, types, premises, and priority levels, facilitating comprehensive tracking and management of customer-related activities.
      words:
