# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: ServiceOrder
    title: Service Order
    sql_table: eng_ao_format_testing.ServiceOrder
    joins:
      # TODO - VERIFY: references nested/dotted field 'customer.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: Customer
        relationship: many_to_one
        sql: "{CUBE}.customer.id = {Customer}.id"
      # TODO - VERIFY: references nested/dotted field 'premise.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: Premise
        relationship: many_to_one
        sql: "{CUBE}.premise.id = {Premise}.id"
    dimensions:
      - name: completionDate
        sql: "{CUBE}.completion_date"
        type: time
        title: Completion Date
        meta:
          llm_description: The date when the service order was completed.
      - name: createdBy
        sql: "{CUBE}.created_by"
        type: string
        title: CreatedBy
        meta:
          llm_description: The identifier of the user who created the service order.
      - name: createdOn
        sql: "{CUBE}.created_on"
        type: time
        title: CreatedOn
        meta:
          llm_description: The date when the service order was created.
      - name: description
        sql: "{CUBE}.description"
        type: string
        title: Description
        meta:
          llm_description: A detailed description of the service order.
      - name: orderType
        sql: "{CUBE}.order_type"
        type: string
        title: Order Type
        meta:
          llm_description: The type of service order.
      - name: priority
        sql: "{CUBE}.priority"
        type: string
        title: Priority
        meta:
          llm_description: The priority level of the service order.
      - name: id
        sql: "{CUBE}.service_order_id"
        type: string
        primary_key: true
        title: Service Order Id
        meta:
          llm_description: The unique identifier of the service order.
      - name: statusCode
        sql: "{CUBE}.status_code"
        type: string
        title: Status Code
        meta:
          llm_description: The current status code of the service order.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::ServiceOrder
      llm_description: The ServiceOrder table tracks details of service orders, including creation and completion dates, creator, customer and premise IDs, order type, priority, status, and a description.
