# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: Customer
    title: Customer
    description: Customer
    sql_table: eng_ao_format_testing.Customer
    dimensions:
      - name: dateOfBirth
        sql: "{CUBE}.date_of_birth"
        type: time
        title: Date Birth
        meta:
          llm_description: The date of birth of the customer.
      - name: firstName
        sql: "{CUBE}.first_name"
        type: string
        title: First Name
        meta:
          llm_description: The first name of the customer.
      - name: id
        sql: "{CUBE}.customer_id"
        type: string
        primary_key: true
        title: ID
        meta:
          llm_description: A unique identifier for the customer.
      - name: lastName
        sql: "{CUBE}.last_name"
        type: string
        title: Last Name
        meta:
          llm_description: The last name of the customer.
      - name: middleName
        sql: "{CUBE}.middle_name"
        type: string
        title: Middle Name
        meta:
          llm_description: The middle name of the customer.
      - name: prefix
        sql: "{CUBE}.prefix"
        type: string
        title: Prefix
        meta:
          llm_description: An optional prefix for the customer's name (e.g., Mr., Mrs., Dr.).
      - name: suffix
        sql: "{CUBE}.suffix"
        type: string
        title: Suffix
        meta:
          llm_description: An optional suffix for the customer's name (e.g., Jr., Sr., III).
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::Customer
      llm_description: The Customer table stores personal information about customers, including their full name, date of birth, and unique identifier, to facilitate customer management and service personalization.
