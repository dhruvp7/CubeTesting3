# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: ServiceOrders
    title: Service Orders
    sql_table: eng_ao_format_testing.service_orders
    joins:
      - name: Customer
        relationship: many_to_one
        sql: "{CUBE}.customer_id = {Customer}.id"
      - name: Premise
        relationship: many_to_one
        sql: "{CUBE}.premise_id = {Premise}.id"
    dimensions:
      - name: completionDate
        sql: "{CUBE}.completion_date"
        type: time
        title: Completion Date
        meta:
          llm_description: The date when the service order was completed.
      - name: createdBy
        sql: "{CUBE}.created_by"
        type: string
        title: CreatedBy
        meta:
          llm_description: The identifier of the user who created the service order.
      - name: createdOn
        sql: "{CUBE}.created_on"
        type: time
        title: CreatedOn
        meta:
          llm_description: The date when the service order was created.
      - name: description
        sql: "{CUBE}.description"
        type: string
        title: Description
        meta:
          llm_description: A brief description of the service order.
      - name: orderType
        sql: "{CUBE}.order_type"
        type: string
        title: Order Type
        meta:
          llm_description: The type or category of the service order.
      - name: priority
        sql: "{CUBE}.priority"
        type: string
        title: Priority
        meta:
          llm_description: The priority level assigned to the service order.
      - name: id
        sql: "{CUBE}.service_order_id"
        type: string
        primary_key: true
        title: Service Order Id
        meta:
          llm_description: The unique identifier of the service order.
      - name: statusCode
        sql: "{CUBE}.status_code"
        type: string
        title: Status Code
        meta:
          llm_description: The current status code of the service order.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::ServiceOrders
      llm_description: The ServiceOrders table tracks details of service orders, including creation and completion dates, creator, customer and premise IDs, order type, priority, status, and a description of the service.
