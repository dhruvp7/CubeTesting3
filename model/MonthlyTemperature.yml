    title: Monthly Temperature
    description: Monthly Temperature data
    sql_table: eng_ao_format_testing.MonthlyTemperature
    joins:
      # TODO - VERIFY: references nested/dotted field 'contractAccount.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: ContractAccount
        relationship: one_to_many
        sql: "{CUBE}.contractAccount.id = {ContractAccount}.id"
      # TODO - VERIFY: references nested/dotted field 'premise.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: Premise
        relationship: one_to_many
        sql: "{CUBE}.premise.id = {Premise}.id"
    dimensions:
      # PLACEHOLDER - replace 'sql' with a real unique column (or CONCAT
      # of columns) for this table. A primary_key is required here because
      # this cube participates in a join.
      - name: composite_key_a
        sql: column_a
        type: number
        primary_key: true
      - name: avgTemperature
        sql: "{CUBE}.avg_temperature"
        type: number
        title: Average Temperature
        meta:
          llm_description: The average temperature recorded for the month.
      - name: localDate
        sql: "{CUBE}.local_date"
        type: string
