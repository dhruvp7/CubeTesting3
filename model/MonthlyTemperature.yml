# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: MonthlyTemperature
    title: Monthly Temperature
    description: Monthly Temperature data
    sql_table: eng_ao_format_testing.mv_monthly_temperature
    joins:
      - name: ContractAccount
        relationship: one_to_many
        sql: "{CUBE}.contract_account_id = {ContractAccount}.id"
      - name: Premise
        relationship: one_to_many
        sql: "{CUBE}.premise_id = {Premise}.id"
    dimensions:
      # Composite key - this table is a materialized view with no single-
      # column primary key. Built from the columns that make a row unique;
      # confirm this combination is actually unique before relying on it.
      - name: composite_key_a
        sql: CONCAT({CUBE}.contract_account_id, '-', {CUBE}.premise_id, '-', {CUBE}.local_date)
        type: string
        primary_key: true
      - name: avgTemperature
        sql: "{CUBE}.avg_temperature"
        type: number
        title: Average Temperature
        meta:
          llm_description: The average temperature recorded for the month.
      - name: localDate
        sql: "{CUBE}.local_date"
        type: string
        title: Bill Month
        meta:
          llm_description: The date for which the temperature data is recorded.
      - name: maxTemperature
        sql: "{CUBE}.max_temperature"
        type: number
        title: Highest Temperature
        meta:
          llm_description: The maximum temperature recorded for the month.
      - name: unitOfMeasure
        sql: "{CUBE}.units_of_measure"
        type: string
        title: Unit Of Measure
        meta:
          llm_description: The unit of measure used for the temperature readings.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::MonthlyTemperature
      llm_description: MonthlyTemperature table records average and maximum temperatures for specific premises, linked to contract accounts, along with the date and unit of measurement.
