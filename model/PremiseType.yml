# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: PremiseType
    title: Premise Type
    description: List of utility premise types
    sql_table: eng_ao_format_testing.PremiseType
    dimensions:
      - name: description
        sql: "{CUBE}.description"
        type: string
        title: Description
        meta:
          llm_description: A textual explanation or summary of the premise type.
      - name: id
        sql: "{CUBE}.id"
        type: string
        primary_key: true
        title: ID
        meta:
          llm_description: A unique identifier assigned to each premise type.
      - name: name
        sql: "{CUBE}.name"
        type: string
        title: Name
        meta:
          llm_description: The name or title of the premise type.
          words:
            - word: Apartment
              wordType: valueWord
              synonyms: []
              plural: apartments
              abbreviation:
              alternateWords: []
              weight: 1
            - word: Single Family Home
              wordType: valueWord
              synonyms: []
              plural: Single Family Homes
              abbreviation:
              alternateWords: []
              weight: 1
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::PremiseType
      llm_description: The PremiseType table categorizes different types of premises, providing a description, unique identifier, and name for each premise type.
