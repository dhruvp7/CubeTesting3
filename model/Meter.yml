            - name: com::apporchid::utilityai::Meter-material-nonFerrous
              displayName: non-ferrous
              taskName: MSOQueryGenerator
              isActive: true
              instruction: non-ferrous Materials without iron, such as brass, bronze and plastic.
              promptWord:
            - name: com::apporchid::utilityai::Meter-material-nonMetal
              displayName: non-metal
              taskName: MSOQueryGenerator
              isActive: true
              instruction: non-metal means Plastic
              promptWord:
      - name: meterLocation
        sql: "{CUBE}.meter_location"
        type: string
