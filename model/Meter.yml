              rule:
                "@class": com.apporchid.criteria.CompositeCriteria
                operator: And
                criterias:
                  - name: material
                    value: Brass
                    "@class": com.apporchid.criteria.StringCriteria
                    operator: Equals
                    expression: false
                    additionalProperties: {}
                  - name: material
                    value: Bronze
                    "@class": com.apporchid.criteria.StringCriteria
                    operator: Equals
                    expression: false
                    additionalProperties: {}
                  - name: material
                    value: Steel
                    "@class": com.apporchid.criteria.StringCriteria
                    operator: Equals
                    expression: false
                    additionalProperties: {}
                isNegated: false
                criteriaCount: 3
                additionalProperties: {}
            - word: Brass
              wordType: valueWord
              synonyms: []
              plural:
              abbreviation:
              alternateWords: []
              weight: 1
            - word: Bronze
              wordType: valueWord
