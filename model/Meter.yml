        sql: "{CUBE}.ageBucket"
        type: string
        title: Age
        meta:
          llm_description: Categorizes the meter based on its age range.
          words:
            - word: Moderate
              wordType: valueWord
              synonyms: []
              plural:
              abbreviation:
              alternateWords: []
              weight: 1
            - word: New
              wordType: valueWord
              synonyms: []
              plural:
              abbreviation:
              alternateWords: []
              weight: 1
            - word: Old
              wordType: valueWord
              synonyms: []
              plural:
              abbreviation:
              alternateWords: []
              weight: 1
      - name: batch
        sql: "{CUBE}.batch"
        type: string
        title: Batch
        meta:
          llm_description: Identifies the production batch of the meter.
      - name: dateOfManufacture
        sql: "{CUBE}.date_of_manufacture"
        type: time
        title: Date of Manufacture
        meta:
          llm_description: Records the date when the meter was manufactured.
      - name: equipmentNumber
        sql: "{CUBE}.equipment_number"
        type: string
        title: Equipment Number
        meta:
          llm_description: Unique identifier assigned to the meter equipment.
      - name: id
        sql: "{CUBE}.id"
        type: string
