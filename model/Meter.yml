        meta:
          llm_description: Unique identifier for the meter record.
      - name: isCompoundMeter
        sql: "{CUBE}.is_compound_meter"
        type: boolean
        title: Is Compound Meter
        meta:
          llm_description: Indicates whether the meter is a compound meter.
      - name: lengthOfService
        sql: "{CUBE}.length_of_service"
        type: number
        title: Length of Service
        meta:
          llm_description: Specifies the duration the meter has been in service.
      - name: manufacturer
        sql: "{CUBE}.manufacturer"
        type: string
        title: Manufacturer
