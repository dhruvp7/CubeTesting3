# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: MeterIssues
    title: Meter Issues
    description: meter issues description..
    sql_table: eng_ao_format_testing.MeterIssues
    joins:
      # TODO - VERIFY: references nested/dotted field 'category.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: MeterIssuesCategory
        relationship: many_to_one
        sql: "{CUBE}.category.id = {MeterIssuesCategory}.id"
      # TODO - VERIFY: references nested/dotted field 'meter.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: Meter
        relationship: many_to_one
        sql: "{CUBE}.meter.id = {Meter}.id"
    dimensions:
      - name: dateReported
        sql: "{CUBE}.date_reported"
        type: time
        title: Date Reported
        meta:
          llm_description: The date when the issue was reported.
      - name: description
        sql: "{CUBE}.description"
        type: string
        title: Description
        meta:
          llm_description: Detailed description of the issue.
          prompts:
            - name: com::apporchid::utilityai::MeterIssues-description-nonresponsive
              displayName: leaky
              taskName: MSOQueryGenerator
              isActive: true
              instruction: leaky means description LIKE '%leaky%'
              promptWord:
            - name: com::apporchid::utilityai::MeterIssues-description-tampered
              displayName: "tampered "
              taskName: MSOQueryGenerator
              isActive: true
              instruction: tampered means description LIKE '%tampered%'
              promptWord:
      - name: id
        sql: "{CUBE}.id"
        type: string
        primary_key: true
        title: ID
        meta:
          llm_description: Unique identifier for the issue.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::MeterIssues
      llm_description: The MeterIssues table logs issues related to water meters, including the category of the issue, the date it was reported, a description, and identifiers for both the issue and the associated meter.
      words:
        - word: "1.0"
          wordType: word
          synonyms: []
          plural:
          abbreviation:
          weight:
        - word: meter issue
          wordType: word
          synonyms:
            - asset issues
            - asset issue
            - meter problem
            - meter problems
            - issue
            - issues
          plural: meter issues
          abbreviation:
          weight: 1
      prompts:
        - name: com::apporchid::utilityai::MeterIssues-errorMeters
          displayName: error
          taskName: MSOQueryGenerator
          isActive: true
          instruction: error mean description LIKE '%error%'
          promptWord:
        - name: com::apporchid::utilityai::MeterIssues-errorMeters
          displayName: error
          taskName: MSOQueryGenerator
          isActive: true
          instruction: error mean description LIKE '%error%'
          promptWord:
        - name: com::apporchid::utilityai::MeterIssues-nonresponsive
          displayName: nonresponsive
          taskName: MSOQueryGenerator
          isActive: true
          instruction: nonresponsive means description = 'no response'
          promptWord:
        - name: com::apporchid::utilityai::MeterIssues-nonresponsive
          displayName: nonresponsive
          taskName: MSOQueryGenerator
          isActive: true
          instruction: nonresponsive means description = 'no response'
          promptWord:
