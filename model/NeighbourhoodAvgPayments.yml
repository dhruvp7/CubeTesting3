# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: NeighbourhoodAvgPayments
    title: Neighborhood Average Payments
    description: Neighbourhood Average Payments
    sql_table: eng_ao_format_testing.neigbourhood_average_payments
    joins:
      - name: ContractAccount
        relationship: many_to_one
        sql: "{CUBE}.contract_account_id = {ContractAccount}.id"
      - name: Customer
        relationship: many_to_one
        sql: "{CUBE}.customer_id = {Customer}.id"
      - name: Premise
        relationship: many_to_one
        sql: "{CUBE}.premise_id = {Premise}.id"
    dimensions:
      # Composite key - this table is a materialized view with no single-
      # column primary key. Built from the columns that make a row unique;
      # confirm this combination is actually unique before relying on it.
      - name: composite_key_a
        sql: CONCAT({CUBE}.customer_id, '-', {CUBE}.contract_account_id, '-', {CUBE}.premise_id, '-', {CUBE}.payment_date)
        type: string
        primary_key: true
      - name: avgPayment
        sql: "{CUBE}.avg_payment"
        type: number
        title: Average Payment
        meta:
          llm_description: The average payment amount made by customers in the neighborhood.
      - name: paymentAmount
        sql: "{CUBE}.payment_amount"
        type: number
        title: Payment Amount
        meta:
          llm_description: The specific amount paid by the customer.
      - name: paymentDate
        sql: "{CUBE}.payment_date"
        type: time
        title: Payment Date
        meta:
          llm_description: The date on which the payment was made.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::NeighbourhoodAvgPayments
      llm_description: NeighbourhoodAvgPayments table tracks average payment amounts, contract accounts, customer IDs, payment amounts, payment dates, and premise IDs for managing and analyzing neighborhood-level payment data.
