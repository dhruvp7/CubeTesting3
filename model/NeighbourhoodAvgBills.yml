# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: NeighbourhoodAvgBills
    title: Neighborhood Average Bills
    description: Neighbourhood Average Bills
    sql_table: eng_ao_format_testing.neigbourhood_average_bills
    joins:
      - name: ContractAccount
        relationship: many_to_one
        sql: "{CUBE}.contract_account_id = {ContractAccount}.id"
      - name: Customer
        relationship: many_to_one
        sql: "{CUBE}.customer_id = {Customer}.id"
      - name: Premise
        relationship: many_to_one
        sql: "{CUBE}.premise_id = {Premise}.id"
      - name: Bills
        relationship: many_to_one
        sql: "{CUBE}.bill_month = {Bills}.bill_month"
    dimensions:
      # Composite key - this table is a materialized view with no single-
      # column primary key. Built from the columns that make a row unique;
      # confirm this combination is actually unique before relying on it.
      - name: composite_key_a
        sql: CONCAT({CUBE}.customer_id, '-', {CUBE}.contract_account_id, '-', {CUBE}.premise_id, '-', {CUBE}.bill_month)
        type: string
        primary_key: true
      - name: avgBill
        sql: "{CUBE}.avg_bill"
        type: number
        title: Average Bill
        meta:
          llm_description: The average bill amount for the neighborhood in a given month.
      - name: finalBalance
        sql: "{CUBE}.final_balance"
        type: number
        title: Balance
        meta:
          llm_description: The final balance amount after billing adjustments.
      - name: billMonth
        sql: "{CUBE}.bill_month"
        type: time
        title: Bill Month
        meta:
          llm_description: The month for which the average bill is calculated.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::NeighbourhoodAvgBills
      llm_description: NeighbourhoodAvgBills table tracks average bills, billing month, contract account, customer, final balance, and premise details for neighborhoods, aiding in financial analysis and billing management.
