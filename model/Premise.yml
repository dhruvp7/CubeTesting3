# Split from UtilityAIOntology.cube.yml - see Cube_Format_Changes_Needed.md
# for the full list of open items (BigQuery sql_table qualification, join FK
# verification, placeholder primary keys) that still need review for this cube.
cubes:
  - name: Premise
    title: Premise
    description: This mso represents a premise.
    sql_table: eng_ao_format_testing.Premise
    joins:
      # TODO - VERIFY: references nested/dotted field 'premiseType.id' instead of a flat column. Confirm the real FK column name in the warehouse table and update this SQL condition if needed.
      - name: PremiseType
        relationship: many_to_one
        sql: "{CUBE}.premiseType.id = {PremiseType}.id"
    dimensions:
      - name: county
        sql: "{CUBE}.county"
        type: string
        title: County
        meta:
          llm_description: The county where the premise is situated.
      - name: geom
        sql: "{CUBE}.geom"
        type: string
        title: Geometry
        meta:
          llm_description: The geometric representation of the premise's location.
      - name: houseNo
        sql: "{CUBE}.house_no"
        type: string
        title: House No
        meta:
          llm_description: The house number of the premise.
      - name: id
        sql: "{CUBE}.id"
        type: string
        primary_key: true
        title: ID
        meta:
          llm_description: A unique identifier for the premise.
      - name: latitude
        sql: "{CUBE}.latitude"
        type: number
        title: Latitude
        meta:
          llm_description: The latitude coordinate of the premise's location.
      - name: longitude
        sql: "{CUBE}.longitude"
        type: number
        title: Longitude
        meta:
          llm_description: The longitude coordinate of the premise's location.
    measures:
      - name: count
        type: count
    meta:
      uid: com::apporchid::utilityai::Premise
      llm_description: The Premise table captures detailed information about a property's address, geographic location, and type, including fields for address components, geographic coordinates, and premise type identification.
